appId: com.toolset.app
productName: 工具集
artifactName: "Toolset-${version}-${arch}.${ext}"
directories:
  output: release
files:
  - dist/**/*
  - assets/**/*
win:
  artifactName: "Toolset-Setup-${version}.${ext}"
  target:
    - target: nsis
      arch:
        - x64
  icon: assets/icon.png
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  perMachine: false
  language: 2052
  uninstallDisplayName: 工具集
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: 工具集
mac:
  target:
    - target: dmg
      arch:
        - x64
        - arm64
  icon: assets/icon.icns
linux:
  target: AppImage
  icon: assets/icon.png